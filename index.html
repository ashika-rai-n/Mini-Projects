<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Projects Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                rgba(13, 27, 62, 0.8) 0%, 
                rgba(5, 10, 25, 0.9) 50%, 
                rgba(0, 0, 0, 0.95) 100%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            color: white;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            background: linear-gradient(135deg, #ffffff 0%, #a0c4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            color: #b8c5d6;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.1) 0%, 
                rgba(255, 255, 255, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .project-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        .project-title {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.2);
        }

        .project-description {
            color: #d0dae8;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .features-list {
            list-style: none;
            margin-bottom: 20px;
        }

        .features-list li {
            padding: 5px 0;
            color: #b8c5d6;
            font-size: 0.95rem;
        }

        .features-list li:before {
            content: "✓ ";
            color: #a0c4ff;
            font-weight: bold;
            margin-right: 8px;
        }

        .view-project {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .project-card:hover .view-project {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }

        footer {
            text-align: center;
            color: #b8c5d6;
            margin-top: 60px;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Mini Projects</h1>
            <p class="subtitle">A collection of simple, practical web applications</p>
        </header>

        <div class="projects-grid" id="projectsGrid">
            <!-- Projects will be dynamically inserted here -->
        </div>

        <footer>
            <p>Built with HTML, CSS & JavaScript | Click any card to try it out!</p>
        </footer>
    </div>

    <script>
        // Projects data - more projects to be added here
        const projects = [
            {
                title: "Digital Clock",
                icon: "⏰",
                description: "A simple digital clock that displays the current time in HH:MM:SS format and updates every second.",
                features: [
                    "Live clock updating every 1 second",
                    "Automatically adds leading zeros",
                    "Clean dark UI with glowing effect",
                    "Minimal and easy to integrate into any webpage"
                ],
                link: "./Digital Clock/index.html"
            },
            {
                title: "BMI Calculator",
                icon: "⚖️",
                description: "Calculate your Body Mass Index (BMI) with weight and height inputs, displaying your health category.",
                features: [
                    "Takes weight (kg) and height (cm) as input",
                    "Calculates BMI value instantly",
                    "Displays BMI category (Underweight, Normal, etc.)",
                    "Dark/Light Mode Toggle"
                ],
                link: "./BMI Calculator/index.html"
            },
            {
                title: "Daily Focus Planner",
                icon: "🗓️",
                description: "A simple productivity tool to plan your daily tasks, track progress, and stay focused throughout the day.",
                features: [
                    "Add daily tasks with optional time",
                    "Mark tasks as done or undo completion",
                    "Dynamic progress bar to track completion",
                    "Persistent storage using browser localStorage"
                ],
                link: "./Daily Focus Planner/index.html"
            },
            {
                title: "Todo List",
                icon: "📝",
                description: "A modern and responsive Todo List Web Application to manage daily tasks efficiently.",
                features: [
                    "Add, edit, and delete tasks",
                    "Mark tasks as completed",
                    "Clear all completed tasks at once",
                    "Dynamic task counter for remaining tasks",
                    "Dark/Light Mode Toggle",
                    "Persistent storage using localStorage"
                ],
                link: "./TodoList Application/index.html"
            },
            {
                title: "Scientific Calculator",
                icon: "🧮",
                description: "A sleek dark-themed scientific calculator with advanced math functions, built with pure HTML, CSS, and JavaScript.",
                features: [
                    "Trigonometric functions: sin, cos, tan",
                    "log, ln, sqrt, power (xʸ), absolute value",
                    "DEG/RAD toggle & constants π and e",
                    "Memory store/recall (MS/MR)",
                    "Keyboard support & live result preview"
                ],
                link: "./Scientific Calculator/index.html"
            },
           {
                title: "Tic Tac Toe",
                icon: "❌⭕",
                description: "A classic two-player Tic Tac Toe game built using HTML, CSS, and JavaScript.",
                features: [
                    "Two-player turn-based gameplay",
                    "Winner detection logic",
                    "Draw detection",
                    "Reset and New Game functionality",
                    "Clean and responsive UI"
                ],
                link: "./Tic Tac Toe/index.html"
            },
            {
                title: "Color Palette Generator",
                icon: "🎨",
                description: "Generate beautiful random color palettes with dynamic background and copy-to-clipboard functionality.",
                features: [
                    "Generate 5 random colors instantly",
                    "Click to copy hex color codes",
                    "Dynamic gradient background",
                    "Click any color to apply as background",
                    "Responsive and modern UI"
                ],
                link: "./Color Palette Generator/index.html"
            }
        ];

        // Function to render projects
        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            
            projects.forEach(project => {
                const card = document.createElement('a');
                card.href = project.link;
                card.className = 'project-card';
                
                card.innerHTML = `
                    <div class="project-icon">${project.icon}</div>
                    <h2 class="project-title">${project.title}</h2>
                    <p class="project-description">${project.description}</p>
                    <ul class="features-list">
                        ${project.features.map(feature => `<li>${feature}</li>`).join('')}
                    </ul>
                    <span class="view-project">View Project →</span>
                `;
                
                grid.appendChild(card);
            });
        }
        // Render projects on page load
        renderProjects();
    </script>
</body>
</html>
