<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <h1>Color Palette Generator</h1>
        <button id="generator-btn">
            <i class="fa-solid fa-arrows-rotate"></i>
            Generator Palette
        </button>
        <div class="palette-container">
            <div class="color-box">
                <div class="color" style="background-color:rgb(245, 104, 104)"></div>
                <div class="color-info">
                    <span class="color-value"></span>
                    <i class="far fa-copy cpy-btn" title="copy-to-clipboard"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color:rgb(239, 150, 62)"></div>
                <div class="color-info">
                    <span class="color-value"></span>
                    <i class="far fa-copy cpy-btn" title="copy-to-clipboard"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color:rgb(192, 199, 66)"></div>
                <div class="color-info">
                    <span class="color-value"></span>
                    <i class="far fa-copy cpy-btn" title="copy-to-clipboard"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color:rgb(68, 154, 89)"></div>
                <div class="color-info">
                    <span class="color-value"></span>
                    <i class="far fa-copy cpy-btn" title="copy-to-clipboard"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color:rgb(50, 94, 160)"></div>
                <div class="color-info">
                    <span class="color-value"></span>
                    <i class="far fa-copy cpy-btn" title="copy-to-clipboard"></i>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
