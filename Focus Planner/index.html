<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Focus Planner</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🗓 Daily Focus Planner</h1>
      <p class="subtitle">Plan your day. Stay focused. Get things done.</p>

      <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter your task..." />
        <input type="time" id="timeInput" />
        <button id="addTaskBtn">Add</button>
      </div>

      <ul id="taskList"></ul>

      <div class="progress-container">
        <div id="progressText">0% Completed</div>

        <div class="progress-bar">
          <div id="progressFill"></div>
        </div>
      </div>

      <button id="clearBtn" class="clear-btn">Clear All</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
